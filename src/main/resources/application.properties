spring.datasource.url=${SPRING_DATASOURCE_URL}&serverTimezone=America/Sao_Paulo
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

spring.jackson.time-zone=America/Sao_Paulo

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

resend.api.key=${RESEND_API_KEY}
resend.from=${RESEND_FROM}

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
app.upload.video-dir=${user.home}/hds/uploads/videos

app.frontend.reset-senha-url=${APP_FRONTEND_RESET_SENHA_URL:http://localhost/rhds/public/reset}
app.base-url=${APP_BASE_URL:http://localhost:8080}

